services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: premortem
      POSTGRES_PASSWORD: premortem
      POSTGRES_DB: premortem
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U premortem"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      DATABASE_URL: postgresql://premortem:premortem@db:5432/premortem
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      PREMORTEM_API: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  pgdata:
